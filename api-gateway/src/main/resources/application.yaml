server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: frontend-service
          uri: http://localhost:8081
          predicates:
            - Path=/frontend-service/**
        - id: Monitoring-service
          uri: http://localhost:8082
          predicates:
            - Path=/Monitoring-service/**
        - id: Secret_Management-service
          uri: http://localhost:8083
          predicates:
            - Path=/Secret_Management-service/**
        - id: Log_Management-service
          uri: http://localhost:8084
          predicates:
            - Path=/Log_Management-service/**
        - id: User_profile-service
          uri: http://localhost:8085
          predicates:
            - Path=/User_profile-service/**
        - id: OAuth2_2FA-service
          uri: http://localhost:8086
          predicates:
            - Path=/OAuth2_2FA-service/**
        - id: Chatbox-service
          uri: http://localhost:8087
          predicates:
            - Path=/Chatbox-service/**
        - id: 42API_Management-service
          uri: http://localhost:8088
          predicates:
            - Path=/42API_Management-service/**