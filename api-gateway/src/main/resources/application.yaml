server:
  port: 8080 # Le port d'entrée de ton système

spring:
  cloud:
    config:
      enabled: false # Désactive le client Config pour éviter les erreurs si aucun serveur Config n'est disponible
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8080
          predicates:
            - Path=/api/auth/** # Toute requête commençant par /api/users/
        - id: groupe-service
          uri: https://group-service:8080
          predicates:
            - Path=/api/group/**
        - id: api42 
          uri: http://api42-service:4444
          predicates:
            - Path=/api/api42/**
