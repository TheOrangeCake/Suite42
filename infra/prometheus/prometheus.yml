global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: auth-service
    metrics_path: /api/auth/actuator/prometheus
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: group-service
    metrics_path: /api/group/actuator/prometheus
    static_configs:
      - targets: ['group-service:8083']

  - job_name: api42-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api42-service:8084']

  - job_name: regular-user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['regular-user-service:8085']

  - job_name: chat-service
    metrics_path: /api/chat/actuator/prometheus
    static_configs:
      - targets: ['chat-service:8082']
