# -------------------------------------------------------------------
# Exclusion rules BEFORE CRS evaluation
# -------------------------------------------------------------------

SecRule REQUEST_URI "@beginsWith /api/auth/callback" \
    "id:1000,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off"

SecRule REQUEST_URI "@beginsWith /api/" \
    "id:1001,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920420"

SecRule REQUEST_URI "@beginsWith /api/" \
    "id:1002,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920341"

# Exclude password fields from SQLi/injection detection in regular-user API
# Passwords are arbitrary strings that legitimately contain special characters
SecRule REQUEST_URI "@beginsWith /api/regular-user/" \
    "id:1003,\
    phase:2,\
    pass,\
    nolog,\
    ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:confirm_password,\
    ctl:ruleRemoveTargetByTag=attack-injection-generic;ARGS:confirm_password,\
    ctl:ruleRemoveTargetByTag=attack-rce;ARGS:confirm_password"

SecRule REQUEST_URI "@beginsWith /api/regular-user/auth/" \
    "id:1004,\
    phase:2,\
    pass,\
    nolog,\
    ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:password,\
    ctl:ruleRemoveTargetByTag=attack-injection-generic;ARGS:password,\
    ctl:ruleRemoveTargetByTag=attack-rce;ARGS:password"
