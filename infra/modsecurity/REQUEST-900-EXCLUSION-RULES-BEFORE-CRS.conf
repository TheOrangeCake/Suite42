SecRule REQUEST_URI "@beginsWith /api/auth/login/oauth2/code/" \
    "id:1000,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveTargetById=942100;ARGS:code,\
    ctl:ruleRemoveTargetById=942260;ARGS:code,\
    ctl:ruleRemoveTargetById=920272;ARGS:code"

SecRule REQUEST_URI "@beginsWith /api/" \
    "id:1001,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920420"

SecRule REQUEST_URI "@beginsWith /api/" \
    "id:1002,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920341"
