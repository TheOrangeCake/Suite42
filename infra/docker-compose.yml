name: transcendence

services:
  postgres:
    image: postgres:16-alpine
    container_name: transcendence-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app_net

  frontend:
    build:
      context: ../frontend
      dockerfile: containers/Dockerfile
    ports:
      - "5173:8080"
    depends_on:
      - api-gateway
    networks:
      - app_net

  auth-service:
    build:
      context: ../backend/auth-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      FORTYTWO_CLIENT_ID: ${FORTYTWO_CLIENT_ID}
      FORTYTWO_CLIENT_SECRET: ${FORTYTWO_CLIENT_SECRET}
      FORTYTWO_REDIRECT_URI: ${FORTYTWO_REDIRECT_URI}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net

  group-service:
    build:
      context: ../backend/group-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net


  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - group-service
    networks:
      - app_net

#      
#  nginx:
#    image: nginx:1.27-alpine
#    ports:
#      - "8080:80"
#    volumes:
#      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
#    depends_on:
#      - auth-service
#      - group-service
#    networks:
#      - app_net
  api42-postgresql:
    image: postgres:16-alpine
    container_name: api42-postgresql
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${API42_POSTGRES_DB}
      POSTGRES_USER: ${API42_POSTGRES_USER}
      POSTGRES_PASSWORD: ${API42_POSTGRES_PASSWORD}
    volumes:
      - api42-pg:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${API42_POSTGRES_USER} -d ${API42_POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app_net

  api42-service:
    build:
      context: ../backend/api42-service
      dockerfile: Dockerfile
    container_name: api42-service
    ports:
      - "4444:4444"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_HOST: api42-postgresql
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${API42_POSTGRES_DB}
      POSTGRES_USER: ${API42_POSTGRES_USER}
      POSTGRES_PASSWORD: ${API42_POSTGRES_PASSWORD}
      API42_UID: ${API42_UID}
      API42_SECRET: ${API42_SECRET}
    depends_on:
      api42-postgresql:
        condition: service_healthy
    networks:
      - app_net
    tty: true


volumes:
  pg_data:
  api42-pg:

networks:
  app_net:
    driver: bridge
