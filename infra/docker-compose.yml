name: transcendence

services:
  postgres:
    image: postgres:16-alpine
    container_name: transcendence-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app_net

  frontend:
    image: node:lts-slim
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: sh -c "npm ci && npm run dev -- --host"
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - app_net
    environment:
    - VITE_API_URL=${VITE_API_URL}

  auth-service:
    build:
      context: ../backend/auth-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      FORTYTWO_CLIENT_ID: ${FORTYTWO_CLIENT_ID}
      FORTYTWO_CLIENT_SECRET: ${FORTYTWO_CLIENT_SECRET}
      FORTYTWO_REDIRECT_URI: ${FORTYTWO_REDIRECT_URI}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net

  group-service:
    build:
      context: ../backend/group-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net

  chat-service:
    build:
      context: ../backend/chat-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net

  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
      #   ports:
      # - "8080:8080"
    depends_on:
      - auth-service
      - group-service
      - chat-service
    networks:
      - app_net

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx:/etc/nginx/certs:ro
    depends_on:
      - api-gateway
    networks:
      - app_net

  api42-postgresql:
    image: postgres:16-alpine
    container_name: api42-postgresql
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${API42_POSTGRES_DB}
      POSTGRES_USER: ${API42_POSTGRES_USER}
      POSTGRES_PASSWORD: ${API42_POSTGRES_PASSWORD}
    volumes:
      - api42-pg:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${API42_POSTGRES_USER} -d ${API42_POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app_net

  api42-service:
    build:
      context: ../backend/api42-service
      dockerfile: Dockerfile
    container_name: api42-service
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_HOST: api42-postgresql
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${API42_POSTGRES_DB}
      POSTGRES_USER: ${API42_POSTGRES_USER}
      POSTGRES_PASSWORD: ${API42_POSTGRES_PASSWORD}
      API42_UID: ${API42_UID}
      API42_SECRET: ${API42_SECRET}
      API42_NEXT_SECRET: ${API42_NEXT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - api42-images:/app/uploads
    depends_on:
      api42-postgresql:
        condition: service_healthy
    networks:
      - app_net
    tty: true

  regular-user-postgresql:
    image: postgres:16-alpine
    container_name: regular-user-postgresql
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${REGULAR_USER_POSTGRES_DB}
      POSTGRES_USER: ${REGULAR_USER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${REGULAR_USER_POSTGRES_PASSWORD}
    volumes:
      - regular-user-pg:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${REGULAR_USER_POSTGRES_USER} -d ${REGULAR_USER_POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app_net

  regular-user-service:
    build:
      context: ../backend/regular-user-service
      dockerfile: Dockerfile
    container_name: regular-user-service
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_HOST: regular-user-postgresql
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${REGULAR_USER_POSTGRES_DB}
      POSTGRES_USER: ${REGULAR_USER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${REGULAR_USER_POSTGRES_PASSWORD}
      REGULAR_USER_JWT_KEY: ${REGULAR_USER_JWT_KEY}
      REGULAR_USER_EMAIL: ${REGULAR_USER_EMAIL}
      REGULAR_USER_APP_PASSWORD: ${REGULAR_USER_APP_PASSWORD}
    volumes:
      - regular-user-images:/app/uploads
    depends_on:
      regular-user-postgresql:
        condition: service_healthy
    networks:
      - app_net
    tty: true

volumes:
  pg_data:
  api42-pg:
  api42-images:
  regular-user-pg:
  regular-user-images:

networks:
  app_net:
    driver: bridge
