# Common properties
spring.application.name=regular-user-service
server.port=8085
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
spring.jpa.defer-datasource-initialization=false
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

regUser.upload-location=/app/uploads
regUser.image-domain=http://localhost:8085/images-regular/
regUser.default-banner=default_profile_banner.jpg
regUser.default-avatar=default_profile_avatar.jpg

